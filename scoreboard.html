<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard — Sense of Escape</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:     #C9A84C;
    --gold-dim: #7A5F2A;
    --dark:     #0A0806;
    --panel:    #110E09;
    --border:   #3A2E18;
    --text:     #E8D5A3;
    --dim:      #8A7A58;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .header { text-align: center; margin-bottom: 40px; }

  .skull {
    font-size: 24px;
    opacity: 0.6;
    display: block;
    margin-bottom: 8px;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,100%{opacity:.6}92%{opacity:.6}93%{opacity:.2}94%{opacity:.6}96%{opacity:.3}97%{opacity:.6}
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(20px, 3.5vw, 38px);
    color: var(--gold);
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .subtitle {
    font-family: 'IM Fell English', serif;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    width: 320px;
  }
  .divider-line { flex:1; height:1px; background: linear-gradient(to right, transparent, var(--gold-dim), transparent); }
  .divider-diamond { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); box-shadow:0 0 8px rgba(201,168,76,0.5); }

  .table-wrap {
    width: 100%;
    max-width: 860px;
    border: 1px solid var(--border);
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .table-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr { background: #16120A; border-bottom: 1px solid var(--border); }

  th {
    padding: 14px 16px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
  }
  th:first-child { text-align: left; width: 40px; }
  th:nth-child(2) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid rgba(58,46,24,0.4);
    transition: background 0.15s;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(4px); }
    to   { opacity:1; transform:translateY(0); }
  }

  tbody tr:hover { background: rgba(201,168,76,0.03); }

  td {
    padding: 14px 16px;
    font-family: 'IM Fell English', serif;
    font-size: 14px;
    color: var(--text);
    text-align: center;
  }
  td:first-child { text-align: left; }
  td:nth-child(2) { text-align: left; }

  .rank { font-family:'Cinzel',serif; font-size:11px; color:var(--dim); }
  .rank-1 { color:var(--gold); }
  .rank-2 { color:#C0C0C0; }
  .rank-3 { color:#CD7F32; }

  .player-id { font-family:'Cinzel',serif; font-size:12px; color:var(--dim); }
  .player-id span { color:var(--text); font-size:14px; }

  .col-level { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .cell-score { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold); }
  .cell-time  { font-size:12px; color:var(--dim); }
  .cell-empty { color:rgba(138,122,88,0.3); font-style:italic; font-size:13px; }

  .total-score {
    font-family:'Cinzel',serif;
    font-size:17px;
    font-weight:700;
    color:var(--gold);
    text-shadow:0 0 12px rgba(201,168,76,0.4);
  }

  .loading {
    padding: 60px;
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-size: 15px;
    color: var(--dim);
    font-style: italic;
  }

  .back-btn {
    margin-top: 32px;
    padding: 11px 36px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--gold-dim);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }

  .back-btn:hover {
    background: rgba(201,168,76,0.08);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }

  .corner { position:absolute; width:14px; height:14px; border-color:var(--gold-dim); border-style:solid; opacity:0.5; }
  .corner.tl { top:8px; left:8px; border-width:1px 0 0 1px; }
  .corner.tr { top:8px; right:8px; border-width:1px 1px 0 0; }
  .corner.bl { bottom:8px; left:8px; border-width:0 0 1px 1px; }
  .corner.br { bottom:8px; right:8px; border-width:0 1px 1px 0; }
</style>
</head>
<body>

<div class="header">
  <span class="skull">☽ ✦ ☾</span>
  <h1>Hall of Escapees</h1>
  <p class="subtitle">Sense of Escape &mdash; Records</p>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>
</div>

<div class="table-wrap">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>Vase Puzzle</th>
        <th>Combat</th>
        <th>Frozen Door</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="scoreBody">
      <tr><td colspan="6"><div class="loading">Summoning the records...</div></td></tr>
    </tbody>
  </table>
</div>

<a class="back-btn" href="javascript:window.close()">&#8592; Close</a>

<script>
const rankSymbols = ['✦','✧','◆'];
const rankClasses = ['rank-1','rank-2','rank-3'];

fetch('scoreboard.php')
  .then(r => r.json())
  .then(data => {
    const body = document.getElementById('scoreBody');
    body.innerHTML = '';

    if (!data.success || data.players.length === 0) {
      body.innerHTML = '<tr><td colspan="6"><div class="loading">No records yet...</div></td></tr>';
      return;
    }

    data.players.forEach((player, i) => {
      const lvlMap = {};
      player.levels.forEach(l => lvlMap[l.order_no] = l);

      const cell = (orderNo) => {
        const l = lvlMap[orderNo];
        if (!l) return `<td><span class="cell-empty">—</span></td>`;
        return `<td>
          <div class="col-level">
            <span class="cell-score">${l.best_score}</span>
            <span class="cell-time">${l.best_time.toFixed(1)}s</span>
          </div>
        </td>`;
      };

      const rankSym   = i < 3 ? rankSymbols[i] : (i + 1);
      const rankClass = i < 3 ? rankClasses[i] : 'rank';

      body.innerHTML += `
        <tr style="animation-delay:${i * 0.07}s">
          <td class="rank ${rankClass}">${rankSym}</td>
          <td class="player-id">****<span>${player.last4digits}</span></td>
          ${cell(1)}
          ${cell(2)}
          ${cell(3)}
          <td class="total-score">${player.total_score}</td>
        </tr>`;
    });
  })
  .catch(() => {
    document.getElementById('scoreBody').innerHTML =
      '<tr><td colspan="6"><div class="loading">Could not connect to server...</div></td></tr>';
  });
</script>
</body>
</html>
